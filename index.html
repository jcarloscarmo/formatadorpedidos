<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LojaCell - Gestão de Pedidos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>LojaCell Pedidos</h1>
    <button id="btn-tema" class="btn btn-icon" title="Alternar tema">&#127769;</button>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-secao="tela-entrada">Novo Pedido</button>
    <button class="tab-btn" data-secao="tela-fila">Fila</button>
    <button class="tab-btn" data-secao="tela-conferencia">Conferência</button>
    <button class="tab-btn" data-secao="tela-relatorio">Relatório</button>
    <button class="tab-btn" data-secao="tela-revisao">Revisão</button>
  </nav>

  <main class="container">
    <section id="tela-entrada" class="secao">
      <h2>Entrada de Pedido <button class="help-badge" type="button" data-help="Use Colar para trazer o texto da área de transferência, Formatar para apenas gerar a mensagem e Processar Pedido para criar o pedido e enviar para o próximo passo.">?</button></h2>
      <label for="input-pedido">Cole a lista de peças abaixo:</label>
      <textarea id="input-pedido" rows="8" placeholder="Cole aqui a lista de peças do pedido..."></textarea>
      <div class="button-group">
        <button id="btn-colar" class="btn btn-secondary" type="button">Colar</button>
        <button id="btn-formatar" class="btn btn-primary" type="button">Formatar</button>
        <button id="btn-processar" class="btn btn-success" type="button">Processar Pedido</button>
      </div>
      <div id="resultado-formatado" class="resultado hidden"></div>
      <div id="resumo-pedido" class="resultado hidden"></div>
      <div class="button-group">
        <button id="btn-copiar" class="btn btn-secondary hidden">Copiar para WhatsApp</button>
      </div>
    </section>

    <section id="tela-fila" class="secao hidden">
      <h2>Fila de Espera <button class="help-badge" type="button" data-help="Aqui ficam os pedidos aguardando conferência. Clique em um pedido para validar preços, frete e recebimento.">?</button></h2>
      <div id="lista-fila"></div>
    </section>

    <section id="tela-conferencia" class="secao hidden">
      <h2>Conferência de Estoque e Valores <button class="help-badge" type="button" data-help="Defina valor de cada peça, confirme recebimento e informe o frete. Ao faturar, o pedido entra no relatório.">?</button></h2>
      <div id="conferencia-conteudo">
        <p class="empty-state">Selecione um pedido na Fila para iniciar a conferência.</p>
      </div>
    </section>

    <section id="tela-relatorio" class="secao hidden">
      <h2>Relatório e Painel de Controle <button class="help-badge" type="button" data-help="Veja os pedidos faturados, abra a edição rápida clicando no pedido e gere a prévia do relatório por período.">?</button></h2>
      <div id="relatorio-conteudo"></div>
    </section>

    <section id="tela-revisao" class="secao hidden">
      <h2>Revisão de Peças do Período <button class="help-badge" type="button" data-help="Revise as peças do período e marque as devolvidas. Os valores devolvidos são abatidos antes da visualização final.">?</button></h2>
      <div id="revisao-conteudo"></div>
    </section>

    <section id="tela-visualizacao" class="secao hidden">
      <h2>Visualização do Relatório <button class="help-badge" type="button" data-help="Essa é a prévia final pronta para impressão. Use o botão de imprimir para salvar como PDF pelo navegador.">?</button></h2>
      <div id="visualizacao-conteudo"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"
          integrity="sha512-MpDFIChbcXl2QgipQrt1VcPHMldRILetapBl5MPCA9Y8r7qvlwx1/Mc9hNTzY+kS5kX6PdoDq41ws1HiVNLdZA=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
